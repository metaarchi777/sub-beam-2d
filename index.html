@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root { color-scheme: light; }
.app {
  --sans: 'IBM Plex Sans KR','Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  --mono: 'IBM Plex Mono',ui-monospace,'SFMono-Regular',Consolas,monospace;
  font-family: var(--sans); color: ${E.ink}; background: ${E.paper};
  min-height: 100vh; padding: 16px; box-sizing: border-box; font-size: 13px;
}
.app *, .app *::before, .app *::after { box-sizing: border-box; }
.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.sub { color: ${E.sub}; font-weight: 400; font-size: 11px; }

.tblock {
  border: 1.5px solid ${E.ink}; background: ${E.panel}; border-radius: 10px;
  padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
  box-shadow: inset 0 0 0 3px ${E.paper}, inset 0 0 0 4px ${E.line};
}
.tb-title { font-size: 19px; font-weight: 700; letter-spacing: 0.06em; }
.tb-ver { font-size: 10px; color: ${E.sub}; letter-spacing: 0.12em; margin-left: 8px; }
.tb-sub { font-size: 12px; color: ${E.sub}; margin-top: 2px; }
.tb-vals { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { border: 1px solid ${E.line}; border-radius: 8px; padding: 5px 10px; background: ${E.paper};
  display: flex; align-items: baseline; gap: 6px; font-size: 13px; }
.chip .ck { font-size: 10px; color: ${E.sub}; letter-spacing: 0.05em; }
.chip .cu { font-size: 10px; color: ${E.sub}; }

.grid { display: grid; grid-template-columns: 378px minmax(0,1fr); gap: 14px; margin-top: 14px; align-items: start; }
@media (max-width: 1080px) { .grid { grid-template-columns: 1fr; } }

.rail { display: flex; flex-direction: column; gap: 12px; }
.sheet { display: flex; flex-direction: column; gap: 12px; min-width: 0; }

.card { background: ${E.panel}; border: 1px solid ${E.line}; border-radius: 10px; padding: 12px 15px; }
.plotcard { padding: 10px 15px 6px; }
.card h3 { margin: 0 0 9px; font-size: 13.5px; font-weight: 700; letter-spacing: 0.01em; }
.cardhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; gap: 8px; }
.cardhead h3 { margin: 0; }

.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 7px; }
.num { display: inline-flex; align-items: center; gap: 5px; }
.num .nl { font-size: 12px; color: ${E.sub}; }
.num input, .nu { font-family: var(--mono); }
.num input {
  border: 1px solid ${E.line}; border-radius: 6px; padding: 4px 6px; font-size: 12.5px;
  background: #FBFCFA; color: ${E.ink};
}
.num input:focus, select:focus, button:focus-visible { outline: 2px solid ${E.shear}; outline-offset: 1px; }
.nu { font-size: 11px; color: ${E.sub}; }
.sel { font-family: var(--sans); font-size: 12px; border: 1px solid ${E.line}; border-radius: 6px; padding: 4px 6px; background: #fff; color: ${E.ink}; }
.hint { font-size: 10.5px; color: ${E.sub}; margin: 2px 0 8px; }
.chk { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; cursor: pointer; }
.chk input { accent-color: ${E.shear}; width: 14px; height: 14px; }

.areahelp { display: flex; flex-wrap: wrap; gap: 6px 8px; align-items: center; border: 1px dashed ${E.grid};
  border-radius: 7px; padding: 6px 8px; margin: 4px 0 2px; background: rgba(255,255,255,0.5); }
.lcbadge { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 8px;
  background: #EEF1EA; color: ${E.ink}; border: 1px solid ${E.line}; }
.lcbadge.lcl { background: #E7F0EE; color: ${E.shear}; border-color: ${E.shear}; }
.loads { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.loadrow { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; background: ${E.paper};
  border: 1px solid ${E.line}; border-radius: 7px; padding: 5px 7px; }
.loadrow select { font-family: var(--sans); font-size: 12px; border: 1px solid ${E.line}; border-radius: 6px;
  padding: 4px 4px; background: #fff; color: ${E.ink}; max-width: 168px; }
.xbtn { margin-left: auto; border: none; background: none; color: ${E.sub}; font-size: 15px; cursor: pointer;
  padding: 0 4px; border-radius: 5px; line-height: 1; }
.xbtn:hover { color: ${E.moment}; background: #F3E4E2; }
.addbtn { align-self: flex-start; border: 1px dashed ${E.grid}; background: none; color: ${E.sub};
  font-size: 11.5px; padding: 4px 9px; border-radius: 7px; cursor: pointer; font-family: var(--sans); }
.addbtn:hover { color: ${E.ink}; border-color: ${E.sub}; }

.minibtn, .resetbtn, .togbtn {
  border: 1px solid ${E.line}; background: ${E.paper}; color: ${E.sub}; font-size: 11px;
  padding: 3px 9px; border-radius: 7px; cursor: pointer; font-family: var(--sans); white-space: nowrap;
}
.minibtn:hover, .resetbtn:hover, .togbtn:hover { color: ${E.ink}; border-color: ${E.sub}; }
.minibtn:disabled { opacity: 0.45; cursor: default; }
.minibtn:disabled:hover { color: ${E.sub}; border-color: ${E.line}; }
.togbtn { width: 100%; text-align: left; font-size: 12.5px; padding: 6px 10px; }

.cantblock { padding: 7px 0; border-top: 1px solid ${E.paper}; display: flex; flex-direction: column; gap: 6px; }
.cantblock:first-of-type { border-top: none; }

.plot { display: block; touch-action: none; }
.ptitle { font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; font-family: var(--sans); }
.preadout { font-size: 11px; font-family: var(--mono); }
.pzero { font-size: 9.5px; font-family: var(--mono); }
.plabel { font-size: 10.5px; font-weight: 600; font-family: var(--mono); }
.loadlbl { font-size: 10px; font-weight: 600; font-family: var(--mono); }
.jbadge { font-size: 13px; }
.rlabel { font-size: 9.5px; font-family: var(--mono); }
.dimlbl { font-size: 10px; font-family: var(--mono); }
.xaxis text { font-size: 9.5px; font-family: var(--mono); }

.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th, .tbl td { border: 1px solid ${E.line}; padding: 4.5px 8px; text-align: right; }
.tbl th { background: ${E.paper}; font-weight: 600; font-size: 11px; color: ${E.sub}; }

.tbl tbody tr:hover { background: #F7F9F5; }
.tbl .sep { border-left: 2px solid ${E.grid}; }
.foot { font-size: 10.5px; color: ${E.sub}; margin: 7px 0 0; line-height: 1.5; }

.matwrap { margin-top: 9px; }
.dofchips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.dofchip { font-size: 10px; border: 1px solid ${E.line}; border-radius: 6px; padding: 2px 7px; background: ${E.paper}; color: ${E.sub}; }
.mattbl { overflow-x: auto; }
.mattbl .tbl { font-size: 10px; }
.mattbl .tbl th, .mattbl .tbl td { padding: 3px 6px; white-space: nowrap; }

.notes p { font-size: 11.5px; line-height: 1.65; margin: 0 0 7px; color: ${E.ink}; }
.errbox { color: ${E.moment}; font-weight: 600; }
.madeby { text-align: right; font-size: 10px; color: #98A29B; font-family: var(--mono); letter-spacing: 0.05em; margin-top: 10px; padding-right: 2px; }
.printbtn {
  border: 1px solid ${E.ink}; background: ${E.ink}; color: #fff; font-size: 12px; font-weight: 600;
  padding: 7px 14px; border-radius: 8px; cursor: pointer; font-family: var(--sans); letter-spacing: 0.02em;
}
.printbtn:hover { background: #33454F; }
.printbtn:disabled { opacity: 0.55; cursor: progress; }
.projbar { display: flex; align-items: stretch; gap: 0; flex: 1; min-width: 0; margin: 0 14px; }

.bhx { font-size: 9px; color: ${E.sub}; font-family: var(--mono); }
@media print { .medit-ov { display: none !important; } }
.printonly { display: none; }
@media (prefers-reduced-motion: no-preference) {
